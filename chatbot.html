<!DOCTYPE html>
<html>
<head>
  <title>Learning AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
    }

    #chat {
      width: 450px;
      height: 420px;
      border: 1px solid #444;
      padding: 10px;
      overflow-y: auto;
      background: #1c1c1c;
    }

    input {
      width: 320px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin-left: 5px;
    }

    .user { color: #4af; }
    .bot { color: #6f6; }
    .teach { color: #ffcc00; }
  </style>
</head>
<body>

<h2>Learning AI Chatbot 🤖</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask or teach: e.g. 'learn: cats are cute = yes they are'" />
<button onclick="sendMessage()">Send</button>

<script>

// 🧠 Load memory from browser
let memory = JSON.parse(localStorage.getItem("aiMemory") || "{}");

// 💾 Save memory
function saveMemory() {
  localStorage.setItem("aiMemory", JSON.stringify(memory));
}

// 🤖 Bot brain
function botReply(input) {
  input = input.toLowerCase();

  // 🧠 TEACHING MODE
  // format: learn: question = answer
  if (input.startsWith("learn:")) {
    let parts = input.replace("learn:", "").split("=");

    if (parts.length < 2) {
      return "Format: learn: question = answer";
    }

    let question = parts[0].trim();
    let answer = parts[1].trim();

    memory[question] = answer;
    saveMemory();

    return "Got it! I learned: \"" + question + "\"";
  }

  // 🧠 CHECK MEMORY FIRST
  if (memory[input]) {
    return memory[input];
  }

  // 🌟 BASIC KNOWLEDGE
  if (input.includes("hello") || input.includes("hi")) {
    return "Hello! 👋 I can learn new things now!";
  }

  if (input.includes("your name")) {
    return "I'm a learning AI chatbot 🤖";
  }

  if (input.includes("joke")) {
    const jokes = [
      "Why do programmers hate nature? Too many bugs 🐛",
      "Why did the computer break up? It had too many issues 💔",
      "Why was the JS file sad? It felt undefined 😭"
    ];
    return jokes[Math.floor(Math.random() * jokes.length)];
  }

  if (input.includes("time")) {
    return "Current time: " + new Date().toLocaleTimeString();
  }

  // ❓ UNKNOWN
  return "I don't know that yet 🤔 Teach me using: learn: question = answer";
}

function sendMessage() {
  const inputBox = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = inputBox.value;
  if (!userText) return;

  chat.innerHTML += `<div class="user">You: ${userText}</div>`;

  const reply = botReply(userText);

  // highlight teaching messages
  if (userText.startsWith("learn:")) {
    chat.innerHTML += `<div class="teach">Bot: ${reply}</div>`;
  } else {
    chat.innerHTML += `<div class="bot">Bot: ${reply}</div>`;
  }

  inputBox.value = "";
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
