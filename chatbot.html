<!DOCTYPE html>
<html>
<head>
  <title>Simple AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
    }

    #chat {
      width: 400px;
      height: 400px;
      border: 1px solid #444;
      padding: 10px;
      overflow-y: auto;
      background: #1c1c1c;
    }

    input {
      width: 300px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin-left: 5px;
    }

    .user { color: #4af; }
    .bot { color: #6f6; }
  </style>
</head>
<body>

<h2>Simple AI Chatbot 🤖</h2>

<div id="chat"></div>

<input id="input" placeholder="Say something..." />
<button onclick="sendMessage()">Send</button>

<script>
function botReply(input) {
  input = input.toLowerCase();

  // 🤖 basic "AI brain"
  if (input.includes("hello") || input.includes("hi")) {
    return "Hello! 👋";
  }

  if (input.includes("how are you")) {
    return "I'm just code, but I'm doing great!";
  }

  if (input.includes("your name")) {
    return "I'm a simple AI chatbot.";
  }

  if (input.includes("bye")) {
    return "Goodbye! 👋";
  }

  // random fallback
  const fallback = [
    "I don't understand that yet.",
    "Try saying something else.",
    "Hmm... I'm not smart enough for that yet."
  ];

  return fallback[Math.floor(Math.random() * fallback.length)];
}

function sendMessage() {
  const inputBox = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = inputBox.value;
  if (!userText) return;

  chat.innerHTML += `<div class="user">You: ${userText}</div>`;

  const reply = botReply(userText);
  chat.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

  inputBox.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
